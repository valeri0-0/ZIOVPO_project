spring:
  application:
    name: "ziovpo-security-server"

  datasource:
    url: jdbc:postgresql://localhost:5432/ziovpo_db
    username: ${PG_USER}
    password: ${PG_PASS}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate.format_sql: true
    open-in-view: false

jwt:
  secret-key: ${JWT_SECRET_KEY}

server:
  port: 8443
  ssl:
    enabled: true
    key-store: classpath:server.jks
    key-store-type: PKCS12
    key-store-password: ${KEYSTORE_PASSWORD}
    key-alias: valeriserver